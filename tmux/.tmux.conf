# -- core ----------------------------------------------------------------------

set-option -g detach-on-destroy on
set-option -g history-limit 10000

setw -g xterm-keys on
setw -g mode-keys vi

set -s escape-time 0                     # faster command sequences
set -sg repeat-time 600                   # increase repeat timeout
set -s focus-events on

set -g mouse on
set -g extended-keys on
set -g extended-keys-format csi-u

set -g prefix2 M-m                        # GNU-Screen compatible prefix
bind M-m send-prefix

# set -q -g status-utf8 on
# setw -q -g utf8 on


# -- display -------------------------------------------------------------------

# set-option -g status-position top

set -g base-index 1           # start windows numbering at 1
setw -g pane-base-index 1     # make pane numbering consistent with windows

setw -g automatic-rename on   # rename window to reflect current directory/program
set -g automatic-rename-format '#{b:pane_current_path}'
set -g renumber-windows on    # renumber windows when a window is closed

set -g set-titles on          # set terminal title

set -g display-panes-time 800 # slightly longer pane indicators display time
set -g display-time 1000      # slightly longer status messages display time

set -g status-interval 10     # redraw status line every 10 seconds

# activity
set -g monitor-activity on
set -g visual-activity off


# -- sessions ------------------------------------------------------------------

# reload configuration
bind r source-file ~/.tmux.conf \; display '~/.tmux.conf sourced'

# find session
bind M-f command-prompt -p find-session 'switch-client -t %%'

# create session
bind n new-session


# -- windows and panes ----------------------------------------------------------

# split current window horizontally
bind - split-window -v -c "#{pane_current_path}"
# split current window vertically
bind | split-window -h -c "#{pane_current_path}"

# pane navigation
bind -r h select-pane -L  # move left
bind -r j select-pane -D  # move down
bind -r k select-pane -U  # move up
bind -r l select-pane -R  # move right
bind > swap-pane -D       # swap current pane with the next one
bind < swap-pane -U       # swap current pane with the previous one

# toggle zoom for current pane
bind + resize-pane -Z

# pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# window navigation
unbind n
unbind p
bind w new-window -c "#{pane_current_path}"
bind Tab next-window        # move to last active window


# -- copy mode -----------------------------------------------------------------

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi M-k send-keys -N 5 -X cursor-up
bind -T copy-mode-vi M-j send-keys -N 5 -X cursor-down
bind p paste-buffer
bind-key -n F4 copy-mode \; send -X start-of-line

# clear both screen and history
# bind -n C-l send-keys C-l \; run 'sleep 0.2' \; clear-history


# -- scratch popup --------------------------------------------------------------

bind-key a if-shell -F '#{==:#{session_name},scratch}' {
  detach-client
} {
  # open in the same directory of the current pane
  display-popup -w 90% -h 90% -d "#{pane_current_path}" -E "tmux new-session -A -s scratch"
}


# -- app integrations ----------------------------------------------------------

# NVIM navigation
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
# bind-key -n C-w send-keys C-d

# OPENCODE navigation
is_opencode="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?opencode$'"
bind-key -n M-j if-shell "$is_opencode" 'send-keys Down' 'send-keys M-j'
bind-key -n M-k if-shell "$is_opencode" 'send-keys Up' 'send-keys M-k'


# -- theme: dracula ------------------------------------------------------------

set -g @dracula-plugins "cpu-usage ram-usage"
set -g @dracula-cpu-usage-label "󰍛 "
set -g @dracula-ram-usage-label " "
set -g @dracula-left-icon-padding 1
set -g @dracula-show-left-icon session
set -g @dracula-transparent-powerline-bg true

set -g @dracula-colors "
# Dracula Color Pallette
white='#adb2b8'
dark_gray='#adb2b8'
# light_purple='#'
dark_purple='#2f2f2f'
cyan='#CCC'
green='#CCC'
orange='#2f2f2f'
# red='#ff5555'
pink='#CCC'
yellow='#2f2f2f'
"


# -- plugins -------------------------------------------------------------------

set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

run '~/.tmux/plugins/tpm/tpm'


# -- notes ---------------------------------------------------------------------

# Alt+m acts as secondary prefix.
# Alt+m + Space cycles pane layouts using tmux default binding.
# Alt+m + < / > swaps the current pane with the previous/next pane.

# tmux agent-state notifier — sourced last so the per-tab state marker extends the theme
if-shell '[ -f ~/.config/tmux/agents.conf ]' 'source-file ~/.config/tmux/agents.conf'
